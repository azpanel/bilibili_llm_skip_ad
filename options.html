<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><title>B 站 AI 广告跳过设置</title><link rel="stylesheet" href="options.css"></head><body><main><h1>B 站 AI 广告跳过</h1><p>密钥仅保存在本设备。字幕会发送到你配置的 OpenRouter 模型进行分析。</p><form id="settings"><label>OpenRouter API Key<input id="api-key" type="password" autocomplete="off" placeholder="sk-or-..."></label><small id="key-hint"></small><label>模型名称<input id="model" type="text" placeholder="deepseek/deepseek-chat" required></label><label>识别广告提示词<textarea id="prompt" rows="9" required></textarea></label><button type="submit">保存设置</button><output id="status" aria-live="polite"></output></form></main><script type="module" src="options.js"></script></body></html>
